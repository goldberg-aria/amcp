openapi: 3.0.3
info:
  title: AMCP
  version: 0.2.0
  description: |
    Agent Memory Continuity Protocol.

    AMCP is a protocol for portable, long-term agent memory.
    Current Axon Level 0 bootstrap transport is unauthenticated; auth is deferred to a later phase.
servers:
  - url: https://your-server.example.com
    description: Example AMCP server
tags:
  - name: memories
  - name: sessions
  - name: portability
  - name: extensions
paths:
  /healthz:
    get:
      tags: [extensions]
      summary: Health check
      operationId: healthz
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/capabilities:
    get:
      tags: [extensions]
      summary: Get backend and protocol capabilities
      operationId: getCapabilities
      responses:
        '200':
          description: Capability advertisement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesResult'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/remember:
    post:
      tags: [memories]
      summary: Store memory records
      operationId: remember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/RememberItemInput'
      responses:
        '200':
          description: Remember result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RememberResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/recall:
    post:
      tags: [memories]
      summary: Recall relevant memory records
      operationId: recall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Required. Use `""` to request latest-first recall without lexical matching.
                scope:
                  $ref: '#/components/schemas/MemoryScope'
                types:
                  type: array
                  items:
                    $ref: '#/components/schemas/EventType'
                limit:
                  type: integer
                token_budget:
                  type: integer
                context_budget:
                  $ref: '#/components/schemas/ContextBudget'
                depth:
                  type: string
                  enum: [shallow, deep]
                session_id:
                  type: string
      responses:
        '200':
          description: Recall result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecallResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/ingest:
    post:
      tags: [extensions]
      summary: Ingest a source into a canonical memory item
      operationId: ingestMemory
      description: Available only when `capabilities.extensions` includes `ingest`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '200':
          description: Remember-style result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RememberResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Extension not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/sessions:
    get:
      tags: [sessions]
      summary: List sessions
      operationId: listSessions
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: scope[kind]
          schema:
            $ref: '#/components/schemas/ScopeKind'
        - in: query
          name: scope[id]
          schema:
            type: string
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResult'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/sessions/{sessionId}:
    get:
      tags: [sessions]
      summary: Get session detail
      operationId: getSession
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
        - in: query
          name: scope[kind]
          schema:
            $ref: '#/components/schemas/ScopeKind'
        - in: query
          name: scope[id]
          schema:
            type: string
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/export:
    post:
      tags: [portability]
      summary: Export memories
      operationId: exportMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  $ref: '#/components/schemas/MemoryScope'
                types:
                  type: array
                  items:
                    $ref: '#/components/schemas/EventType'
                format:
                  type: string
                  enum: [json, jsonl]
      responses:
        '200':
          description: Export result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResult'
            text/plain:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/import:
    post:
      tags: [portability]
      summary: Import memories
      operationId: importMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportRequest'
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/forget:
    post:
      tags: [memories]
      summary: Soft-delete memory records
      operationId: forgetMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgetRequest'
      responses:
        '200':
          description: Soft-delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteManyResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/erase:
    post:
      tags: [memories]
      summary: Permanently erase memory records
      operationId: eraseMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EraseRequest'
      responses:
        '200':
          description: Hard-delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EraseResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/amcp/memories/{memoryId}:
    delete:
      tags: [memories]
      summary: Soft-delete a memory record
      operationId: deleteMemory
      parameters:
        - in: path
          name: memoryId
          required: true
          schema:
            type: string
        - in: query
          name: scope[kind]
          schema:
            $ref: '#/components/schemas/ScopeKind'
        - in: query
          name: scope[id]
          schema:
            type: string
        - in: query
          name: deletion_source
          schema:
            $ref: '#/components/schemas/DeletionSource'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Backend mode is configured but not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service, backend, timestamp]
      properties:
        status:
          type: string
        service:
          type: string
        backend:
          type: string
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    CapabilitiesResult:
      type: object
      required:
        - protocol_version
        - conformance_level
        - lifecycle_profiles
        - security_profile
        - operations
        - extensions
        - backend_modes
        - supports_budget_recall
        - supports_compaction_checkpoints
        - supports_provenance
        - max_item_size
        - retention_policies
      properties:
        protocol_version:
          type: string
        conformance_level:
          type: string
          enum: [L0, L1, L2]
          description: |
            Declared protocol conformance level per SPEC §9.1.
        lifecycle_profiles:
          type: array
          items:
            type: string
          description: |
            Declared lifecycle profiles per SPEC §6.6.
            Standard values: lifecycle.soft, lifecycle.batch, lifecycle.hard, lifecycle.cryptographic.
            Vendor profiles use lifecycle.x-<vendor>-<name>.
          example: ["lifecycle.soft", "lifecycle.batch"]
        security_profile:
          type: string
          description: |
            Declared security profile per SPEC §13.
            Standard values: security.bearer, security.oauth2, security.mtls,
            security.none-loopback, security.axon-bootstrap.
            Vendor profiles use security.x-<vendor>-<name>.
          example: "security.bearer"
        operations:
          type: array
          items:
            type: string
        extensions:
          type: array
          items:
            type: string
        backend_modes:
          type: array
          items:
            type: string
        supports_budget_recall:
          type: boolean
        supports_compaction_checkpoints:
          type: boolean
        supports_provenance:
          type: boolean
        max_item_size:
          type: integer
        retention_policies:
          type: array
          items:
            type: string
    EventType:
      type: string
      enum: [decision, task, context, artifact, error, convention]
    ScopeKind:
      type: string
      description: Canonical scope kinds. Implementations may accept additional aliases and normalize them internally.
      enum: [user, project, team, org]
    Visibility:
      type: string
      description: Canonical visibility values. Input aliases such as `personal` and `user` may be accepted and normalized to `private`.
      enum: [private, project, team, org]
    RetentionMode:
      type: string
      description: Canonical retention modes. Implementations may accept additional aliases and normalize them internally.
      enum: [ephemeral, persistent, ttl]
    DeletionSource:
      type: string
      enum: [user, agent, policy, import]
    MemoryScope:
      type: object
      required: [kind, id]
      properties:
        kind:
          $ref: '#/components/schemas/ScopeKind'
        id:
          type: string
    MemoryOrigin:
      type: object
      properties:
        agent_id:
          type: string
        app_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        timestamp:
          type: string
          format: date-time
    MemoryRetention:
      type: object
      required: [mode]
      description: When `mode` is `ttl`, `until` should be provided as an RFC3339 timestamp.
      properties:
        mode:
          $ref: '#/components/schemas/RetentionMode'
        until:
          type: string
          format: date-time
    ContextBudget:
      type: object
      properties:
        max_tokens:
          type: integer
        priority:
          type: string
        active_files:
          type: array
          items:
            type: string
    SourceRef:
      type: object
      required: [kind, uri]
      properties:
        kind:
          type: string
        uri:
          type: string
      additionalProperties: true
    ImportRequestBase:
      type: object
      properties:
        format:
          type: string
          enum: [json, jsonl]
        preserve_ids:
          type: boolean
        preserve_timestamps:
          type: boolean
        preserve_origin:
          type: boolean
        dedupe:
          oneOf:
            - type: boolean
            - type: string
              enum: [id, content_hash]
    ImportRequest:
      oneOf:
        - allOf:
            - $ref: '#/components/schemas/ImportRequestBase'
            - type: object
              required: [items]
              properties:
                items:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/RememberItemInput'
        - allOf:
            - $ref: '#/components/schemas/ImportRequestBase'
            - type: object
              required: [data]
              properties:
                data:
                  type: string
    IngestHints:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/EventType'
        scope:
          $ref: '#/components/schemas/MemoryScope'
        origin:
          $ref: '#/components/schemas/MemoryOrigin'
        visibility:
          $ref: '#/components/schemas/Visibility'
        retention:
          $ref: '#/components/schemas/MemoryRetention'
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        source_refs:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        energy:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    IngestRequest:
      type: object
      required: [source]
      properties:
        source:
          type: string
        hints:
          $ref: '#/components/schemas/IngestHints'
    RememberItemInput:
      type: object
      required: [content, type, scope, visibility, retention]
      properties:
        id:
          type: string
        content:
          type: string
        type:
          $ref: '#/components/schemas/EventType'
        scope:
          $ref: '#/components/schemas/MemoryScope'
        origin:
          $ref: '#/components/schemas/MemoryOrigin'
        visibility:
          $ref: '#/components/schemas/Visibility'
        retention:
          $ref: '#/components/schemas/MemoryRetention'
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
          description: |
            Free-form metadata. Vendor-specific extensions MUST use the
            `x-` or `x-<vendor>-` key prefix as defined in SPEC §11.1.
            Conforming clients MUST ignore unknown `x-*` keys without error.
        source_refs:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        energy:
          type: number
        session_id:
          description: Compatibility alias for `origin.session_id`. Servers may normalize this into `origin.session_id` before storage.
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    MemoryItem:
      type: object
      required:
        - id
        - content
        - type
        - energy
        - scope
        - origin
        - visibility
        - retention
        - tags
        - metadata
        - source_refs
      properties:
        id:
          type: string
        content:
          type: string
        type:
          type: string
        energy:
          type: number
        scope:
          $ref: '#/components/schemas/MemoryScope'
        origin:
          $ref: '#/components/schemas/MemoryOrigin'
        visibility:
          type: string
        retention:
          $ref: '#/components/schemas/MemoryRetention'
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
          description: |
            Free-form metadata. Vendor-specific extensions MUST use the
            `x-` or `x-<vendor>-` key prefix as defined in SPEC §11.1.
            Conforming clients MUST ignore unknown `x-*` keys without error.
        source_refs:
          type: array
          items:
            $ref: '#/components/schemas/SourceRef'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RememberResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [id]
            properties:
              id:
                type: string
        session_id:
          type: string
          nullable: true
    RecallOverflow:
      type: object
      properties:
        remaining:
          type: integer
        remaining_atoms:
          type: integer
    RecallResult:
      type: object
      required: [items, tokens_used]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MemoryItem'
        graph_context:
          type: string
          nullable: true
        tokens_used:
          type: integer
        overflow:
          allOf:
            - $ref: '#/components/schemas/RecallOverflow'
          nullable: true
    SessionSummary:
      type: object
      required: [id, status, last_activity, atom_count]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [active, paused, closed]
        summary:
          type: string
        key_decisions:
          type: array
          items:
            type: string
        last_activity:
          type: string
          format: date-time
        atom_count:
          type: integer
    SessionListResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
    SessionDetail:
      type: object
      required: [item, chain]
      properties:
        item:
          $ref: '#/components/schemas/SessionSummary'
        chain:
          type: array
          items:
            $ref: '#/components/schemas/MemoryItem'
    ExportResult:
      type: object
      required: [format, items]
      properties:
        format:
          type: string
          enum: [json]
        items:
          type: array
          items:
            $ref: '#/components/schemas/MemoryItem'
    ImportResultItem:
      type: object
      required: [status]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [imported, skipped]
        type:
          type: string
        scope:
          $ref: '#/components/schemas/MemoryScope'
    ImportResult:
      type: object
      required: [imported_count, skipped_count, items]
      properties:
        imported_count:
          type: integer
        skipped_count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImportResultItem'
    ForgetRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 1
          items:
            type: string
        deletion_source:
          $ref: '#/components/schemas/DeletionSource'
        scope:
          $ref: '#/components/schemas/MemoryScope'
    DeleteResult:
      type: object
      required: [id, status, deleted_at]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [deleted]
        deleted_at:
          type: string
          format: date-time
        deletion_source:
          $ref: '#/components/schemas/DeletionSource'
    DeleteManyResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeleteResult'
    EraseRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 1
          items:
            type: string
        scope:
          $ref: '#/components/schemas/MemoryScope'
    EraseResult:
      type: object
      required: [erased_count]
      properties:
        erased_count:
          type: integer
        ids:
          type: array
          items:
            type: string
